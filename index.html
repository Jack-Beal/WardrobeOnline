<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4a5e3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Wardrobe">
  <meta name="description" content="Your digital wardrobe companion">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="css/style.css">
  <title>Wardrobe</title>
</head>
<body>
  <div class="auth-page">
    <div class="auth-logo">👗</div>
    <h1 class="auth-title">Wardrobe</h1>
    <p class="auth-subtitle">Your digital wardrobe companion</p>

    <!-- Login View -->
    <div class="auth-card" id="login-view">
      <h2>Sign in</h2>
      <div class="error-msg" id="login-error"></div>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Sign in</button>
      </form>
      <p class="auth-toggle">
        No account?
        <button onclick="showSignup()">Create one</button>
      </p>
    </div>

    <!-- Signup View -->
    <div class="auth-card" id="signup-view" style="display:none">
      <h2>Create account</h2>
      <div class="error-msg" id="signup-error"></div>
      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters" autocomplete="new-password" required minlength="6">
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirm password</label>
          <input type="password" id="signup-confirm" placeholder="Repeat password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="signup-btn">Create account</button>
      </form>
      <p class="auth-toggle">
        Already have an account?
        <button onclick="showLogin()">Sign in</button>
      </p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
